name: Deploy Analysis Agent

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

env:
  AWS_REGION:     ap-northeast-2
  ECR_REPOSITORY: cdci-prd-analysis-agent

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  build-and-push:
    name: Build & Push ECR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: tag
        run: echo "tag=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache,mode=max

      - name: Set image URI output
        run: echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.tag }}" >> $GITHUB_OUTPUT
        id: set-uri

  deploy-agentcore:
    name: Deploy AgentCore Runtime
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install latest AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update AgentCore Runtime
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          NETWORK_CONFIG=$(aws bedrock-agentcore-control get-agent-runtime \
            --agent-runtime-id ${{ secrets.AGENTCORE_RUNTIME_ID }} \
            --region $AWS_REGION \
            --query 'networkConfiguration' \
            --output json)

          aws bedrock-agentcore-control update-agent-runtime \
            --agent-runtime-id ${{ secrets.AGENTCORE_RUNTIME_ID }} \
            --agent-runtime-artifact "{\"containerConfiguration\": {\"containerUri\": \"$IMAGE_URI\"}}" \
            --role-arn ${{ secrets.AGENTCORE_ROLE_ARN }} \
            --network-configuration "$NETWORK_CONFIG" \
            --environment-variables "{\"LLM_PROVIDER\":\"bedrock\",\"BEDROCK_MODEL_ID\":\"${{ secrets.BEDROCK_MODEL_ID }}\"}" \
            --region $AWS_REGION

      - name: Wait for READY
        run: |
          for i in {1..60}; do
            STATUS=$(aws bedrock-agentcore-control get-agent-runtime \
              --agent-runtime-id ${{ secrets.AGENTCORE_RUNTIME_ID }} \
              --region $AWS_REGION \
              --query 'status' --output text)
            [ "$STATUS" = "READY" ] && exit 0
            [[ "$STATUS" == *FAILED* ]] && exit 1
            sleep 10
          done
          exit 1
